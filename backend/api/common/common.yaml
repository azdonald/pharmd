openapi: 3.0.3
info:
  title: PharmD Common Schemas
  version: 1.0.0

paths:
  /health:
    get:
      summary: Health check endpoint
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
        '500':
          description: Service is unhealthy

components:
  schemas:
    Organisation:
      type: object
      properties:
        id:
          type: string
        name:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
        updated_at:
          type: string

    Location:
      type: object
      properties:
        id:
          type: string
        organisation_id:
          type: string
        name:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        country:
          type: string
        phone:
          type: string
        email:
          type: string
        tax_rate:
          type: number
        timezone:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
        updated_at:
          type: string
