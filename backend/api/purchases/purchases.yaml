openapi: 3.0.3
info:
  title: Purchases API
  description: API endpoints for purchase order management
  version: 1.0.0

tags:
  - name: purchases
    description: Purchase order management

paths:
  /purchases:
    get:
      tags:
        - purchases
      summary: List purchase orders
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of purchase orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrderListResponse'
    post:
      tags:
        - purchases
      summary: Create a purchase order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePurchaseOrderRequest'
      responses:
        '201':
          description: Purchase order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'

  /purchases/{id}:
    get:
      tags:
        - purchases
      summary: Get purchase order by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Purchase order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'

  /purchases/{id}/approve:
    put:
      tags:
        - purchases
      summary: Approve a purchase order
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Purchase order approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'

  /purchases/{id}/reject:
    put:
      tags:
        - purchases
      summary: Reject a purchase order
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Purchase order rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'

  /purchases/{id}/receive:
    post:
      tags:
        - purchases
      summary: Record goods received
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceiveGoodsRequest'
      responses:
        '200':
          description: Goods received recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    PurchaseOrder:
      type: object
      properties:
        id:
          type: string
        po_number:
          type: string
        supplier_id:
          type: string
        supplier_name:
          type: string
        location_id:
          type: string
        status:
          type: string
        order_date:
          type: string
        expected_date:
          type: string
        notes:
          type: string
        subtotal:
          type: number
        tax_total:
          type: number
        grand_total:
          type: number
        created_by:
          type: string
        approved_by:
          type: string
          nullable: true
        approved_at:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/PurchaseOrderItem'
        created_at:
          type: string
        updated_at:
          type: string

    PurchaseOrderItem:
      type: object
      properties:
        id:
          type: string
        product_id:
          type: string
        product_name:
          type: string
        quantity_ordered:
          type: integer
        quantity_received:
          type: integer
        unit_cost:
          type: number
        line_total:
          type: number

    CreatePurchaseOrderRequest:
      type: object
      required:
        - supplier_id
        - location_id
        - items
      properties:
        supplier_id:
          type: string
        location_id:
          type: string
        expected_date:
          type: string
        notes:
          type: string
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/POItemInput'

    POItemInput:
      type: object
      required:
        - product_id
        - quantity_ordered
        - unit_cost
      properties:
        product_id:
          type: string
        quantity_ordered:
          type: integer
        unit_cost:
          type: number

    PurchaseOrderListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PurchaseOrder'
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

    ReceiveGoodsRequest:
      type: object
      required:
        - items
      properties:
        notes:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReceiveItem'

    ReceiveItem:
      type: object
      required:
        - item_id
        - quantity_received
      properties:
        item_id:
          type: string
        quantity_received:
          type: integer
