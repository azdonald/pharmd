openapi: 3.0.3
info:
  title: Prescribers API
  description: Prescriber (doctor/dentist) directory
  version: 1.0.0

paths:
  /prescribers:
    get:
      tags:
        - prescribers
      summary: List prescribers
      security:
        - bearerAuth: []
      parameters:
        - name: query
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of prescribers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrescriberListResponse'
    post:
      tags:
        - prescribers
      summary: Create a prescriber
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePrescriberRequest'
      responses:
        '201':
          description: Prescriber created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prescriber'

  /prescribers/{id}:
    get:
      tags:
        - prescribers
      summary: Get prescriber by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Prescriber details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prescriber'
    put:
      tags:
        - prescribers
      summary: Update a prescriber
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePrescriberRequest'
      responses:
        '200':
          description: Prescriber updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prescriber'
    delete:
      tags:
        - prescribers
      summary: Delete a prescriber
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Prescriber deleted

components:
  schemas:
    Prescriber:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        license_number:
          type: string
        phone:
          type: string
        email:
          type: string
        specialty:
          type: string
        dea_number:
          type: string
        npi_number:
          type: string
        address:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
        updated_at:
          type: string

    CreatePrescriberRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        license_number:
          type: string
        phone:
          type: string
        email:
          type: string
        specialty:
          type: string
        dea_number:
          type: string
        npi_number:
          type: string
        address:
          type: string

    UpdatePrescriberRequest:
      type: object
      properties:
        name:
          type: string
        license_number:
          type: string
        phone:
          type: string
        email:
          type: string
        specialty:
          type: string
        dea_number:
          type: string
        npi_number:
          type: string
        address:
          type: string
        is_active:
          type: boolean

    PrescriberListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Prescriber'
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

securitySchemes:
  bearerAuth:
    type: http
    scheme: bearer
    bearerFormat: JWT
