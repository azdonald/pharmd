openapi: 3.0.3
info:
  title: Inventory API
  description: API endpoints for inventory and stock management
  version: 1.0.0

tags:
  - name: inventory
    description: Inventory management

paths:
  /inventory:
    get:
      tags:
        - inventory
      summary: List stock per location
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: location_id
          in: query
          required: true
          schema:
            type: string
        - name: query
          in: query
          schema:
            type: string
          description: Search by product name or batch number
      responses:
        '200':
          description: Stock list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockListResponse'

  /inventory/batches:
    post:
      tags:
        - inventory
      summary: Receive stock batch
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBatchRequest'
      responses:
        '201':
          description: Batch created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockBatch'

  /inventory/adjustments:
    post:
      tags:
        - inventory
      summary: Record stock adjustment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdjustmentRequest'
      responses:
        '200':
          description: Adjustment recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockMovement'

  /inventory/alerts:
    get:
      tags:
        - inventory
      summary: Get low stock alerts
      security:
        - bearerAuth: []
      parameters:
        - name: location_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Low stock alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockAlert'

  /inventory/expiring:
    get:
      tags:
        - inventory
      summary: Get expiring stock
      security:
        - bearerAuth: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
        - name: location_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Expiring stock list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExpiringBatch'

  /inventory/counts:
    post:
      tags:
        - inventory
      summary: Record stock count
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/StockCountItem'
      responses:
        '200':
          description: Count recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  adjustments:
                    type: integer

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    StockBatch:
      type: object
      properties:
        id:
          type: string
        product_id:
          type: string
        product_name:
          type: string
        location_id:
          type: string
        batch_number:
          type: string
        quantity:
          type: integer
        remaining_qty:
          type: integer
        unit_cost:
          type: number
        selling_price:
          type: number
        manufacturing_date:
          type: string
        expiry_date:
          type: string
        received_date:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
        updated_at:
          type: string

    CreateBatchRequest:
      type: object
      required:
        - product_id
        - location_id
        - quantity
      properties:
        product_id:
          type: string
        location_id:
          type: string
        batch_number:
          type: string
        quantity:
          type: integer
        unit_cost:
          type: number
        selling_price:
          type: number
        manufacturing_date:
          type: string
        expiry_date:
          type: string

    StockMovement:
      type: object
      properties:
        id:
          type: string
        product_id:
          type: string
        product_name:
          type: string
        batch_id:
          type: string
        movement_type:
          type: string
        quantity:
          type: integer
        notes:
          type: string
        created_by:
          type: string
        created_at:
          type: string

    CreateAdjustmentRequest:
      type: object
      required:
        - product_id
        - location_id
        - quantity
        - movement_type
      properties:
        product_id:
          type: string
        location_id:
          type: string
        batch_id:
          type: string
        quantity:
          type: integer
        movement_type:
          type: string
        notes:
          type: string

    StockListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: string
              product_name:
                type: string
              brand_name:
                type: string
              generic_name:
                type: string
              classification:
                type: string
              total_quantity:
                type: integer
              reorder_level:
                type: integer
              batches:
                type: array
                items:
                  $ref: '#/components/schemas/BatchSummary'
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

    BatchSummary:
      type: object
      properties:
        id:
          type: string
        batch_number:
          type: string
        quantity:
          type: integer
        unit_cost:
          type: number
        selling_price:
          type: number
        expiry_date:
          type: string
        is_active:
          type: boolean

    StockAlert:
      type: object
      properties:
        product_id:
          type: string
        product_name:
          type: string
        brand_name:
          type: string
        total_quantity:
          type: integer
        reorder_level:
          type: integer
        location_id:
          type: string

    ExpiringBatch:
      type: object
      properties:
        id:
          type: string
        product_id:
          type: string
        product_name:
          type: string
        batch_number:
          type: string
        remaining_qty:
          type: integer
        expiry_date:
          type: string
        days_until_expiry:
          type: integer

    StockCountItem:
      type: object
      required:
        - product_id
        - location_id
        - counted_qty
      properties:
        product_id:
          type: string
        location_id:
          type: string
        batch_id:
          type: string
        counted_qty:
          type: integer
        notes:
          type: string
